name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      os_selection:
        description: 'Select Target Operating System Matrix'
        type: choice
        required: true
        default: '["ubuntu-latest", "windows-2022", "windows-11-arm", "macos-latest"]'
        options:
          - '["ubuntu-latest", "windows-2022", "windows-11-arm", "macos-latest"]' # All
          - '["ubuntu-latest"]'
          - '["windows-2022"]'
          - '["windows-11-arm"]'
          - '["macos-latest"]'

jobs:

  gfortran:
    name: GFortran (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event.inputs.os_selection || '["ubuntu-latest", "windows-2022", "windows-11-arm", "macos-latest"]') }}


    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v2.0.2
        if: matrix.os == 'windows-2022' || matrix.os == 'windows-11-arm'
        with:
          environment-name: tf_env
          create-args: python=3.10 m2w64-gcc-fortran

      # Explicit step that only triggers on Windows to append variables dynamically
      - name: Locate gfortran.exe and Set GITHUB_ENV
        if: matrix.os == 'windows-2022' || matrix.os == 'windows-11-arm'
        shell: bash -l {0}
        run: |
          echo CONDA_PREFIX=$CONDA_PREFIX
          command -v cygpath 
          cygpath -u "$CONDA_PREFIX"
          export UNIX_CONDA_PREFIX=$(cygpath -u "$CONDA_PREFIX")
          echo "Searching for gfortran.exe inside $UNIX_CONDA_PREFIX ..."
          
          # Find the first instance of gfortran.exe recursively
          GFORTRAN_PATH=$(find "$UNIX_CONDA_PREFIX" -type f -name "gfortran.exe" -print -quit)
          
          if [ -z "$GFORTRAN_PATH" ]; then
            echo "::error::gfortran.exe was not found anywhere in the workspace directory!"
            exit 1
          fi
          
          echo "Found compiler at: $GFORTRAN_PATH"
          
          # Export to GITHUB_ENV for use in subsequent pipeline steps
          echo "FC=$GFORTRAN_PATH" >> $GITHUB_ENV
          echo "F77=$GFORTRAN_PATH" >> $GITHUB_ENV
          
      - name: Next Workflow Task
        shell: bash -l {0}
        run: |
          # Works seamlessly across both Windows and Linux now!
          $FC --version
          
      # Step running exclusively on Windows platforms to map wheels correctly via PyPI
      - name: Install TensorFlow via Pip on Windows Runners
        if: matrix.os == 'windows-2022' || matrix.os == 'windows-11-arm'
        shell: bash -l {0}
        run: |
          pip install "tensorflow==2.*" requests tqdm fire
          pip install "numpy==1.26.4"
          command -v python
          
      - uses: mamba-org/setup-micromamba@v2.0.2
        if: matrix.os != 'windows-2022' && matrix.os != 'windows-11-arm'
        with:
          micromamba-version: '2.0.4-0'
          environment-file: environment.yml
          create-args: >-
            ${{ matrix.os == 'macos-latest' && 'gfortran=14.2.0' || '' }}

      - name: Install GGUF
        shell: bash -e -x -l {0}
        run: |
            git clone https://github.com/ggerganov/llama.cpp
            cd llama.cpp
            git checkout 4e9a7f7f7fb6acbddd1462909c8d696e38edbfcc
            cd gguf-py
            pip install .
            cd ../..

      - name: Build and run
        shell: bash -l {0}
        continue-on-error: true 
        run: |
            ci/build.sh


      - name: Collect DLL Dependencies
        shell: bash -el {0}
        if: matrix.os == 'windows-2022' || matrix.os == 'windows-11-arm'
        run: |
          # $CONDA_PREFIX is natively exported on environment activation
          mkdir dist
          
          DLL_SRC_DIR="$CONDA_PREFIX/Library/bin"
          
          echo "Conda active prefix is: $CONDA_PREFIX"
          echo "Scanning for needed toolchain DLLs..."
          # objdump -p chat.exe
          
          # Use objdump (packaged with m2w64-toolchain) to find import requirements
          objdump -p chat.exe | grep -i 'DLL Name:' | awk '{print $3}' | while read -r dll; do
            # Finds the DLL path, strips Windows carriage returns (\r), and converts format
            my_dll_path=$(cygpath -u "$(/c/Windows/System32/where.exe $dll | head -n 1)" | tr -d '\r')

            if [ -f "$my_dll_path" ]; then
              cp "$my_dll_path" dist/
              echo "Successfully Bundled: $my_dll_path"
            else
              echo "[FAILED] MISSING DLL: $my_dll_path"
            fi
          done

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: built-directory
          path: .
          retention-days: 1

  lfortran:
    name: LFortran (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(github.event.inputs.os_selection || '["ubuntu-latest", "windows-2022", "windows-11-arm", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: mamba-org/setup-micromamba@v2.0.2
        with:
          micromamba-version: '2.0.4-0'
          environment-file: environment.yml
          create-args: >-
            lfortran=0.60.0
            ${{ matrix.os == 'ubuntu-latest' && 'llvm-openmp=11.1.0' || '' }}

      - name: Build and run
        shell: bash -l {0}
        run: |
            ci/build_lfortran.sh
